name: Create New Service

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: "Name of the new microservice"
        required: true
        type: string
      team:
        description: "Owning team identifier (may arrive as JSON entity from Port)"
        required: true
        type: string
      language:
        description: "Primary programming language"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        type: string
      internet_facing:
        description: "Is this service internet-facing?"
        required: false
        type: string
        default: "false"
      tier:
        description: "Service tier"
        required: false
        type: string
        default: "standard"
      port_run_id:
        description: "Port action run ID"
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-service:
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: ${{ inputs.service_name }}
      ORG: mike-check-12-12

    steps:
      - name: Parse team identifier
        id: team
        run: |
          RAW_TEAM='${{ inputs.team }}'
          if echo "$RAW_TEAM" | jq -e '.identifier' >/dev/null 2>&1; then
            TEAM_ID=$(echo "$RAW_TEAM" | jq -r '.identifier')
          else
            TEAM_ID="$RAW_TEAM"
          fi
          echo "id=$TEAM_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved team identifier: $TEAM_ID"

      - name: Log action started
        if: inputs.port_run_id != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          logMessage: |
            Creating service **${{ inputs.service_name }}**
            - Team: ${{ steps.team.outputs.id }}
            - Language: ${{ inputs.language }}
            - Environment: ${{ inputs.environment }}
            - Internet-facing: ${{ inputs.internet_facing }}

      - name: Clone service-template
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${ORG}/service-template.git" "${SERVICE_NAME}"
          cd "${SERVICE_NAME}"
          rm -rf .git

      - name: Customize template for this service
        env:
          TEAM_ID: ${{ steps.team.outputs.id }}
        run: |
          cd "${SERVICE_NAME}"
          sed -i "s|SERVICE_NAME|${SERVICE_NAME}|g" k8s/deployment.yaml
          sed -i "s|SERVICE_NAME|${SERVICE_NAME}|g" catalog-info.yaml
          sed -i "s|TEAM_NAME|${TEAM_ID}|g" catalog-info.yaml
          sed -i "s|sample-service|${SERVICE_NAME}|g" app/main.py
          echo "Template customized for ${SERVICE_NAME}"

      - name: Create GitHub repository
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          TEAM_ID: ${{ steps.team.outputs.id }}
        run: |
          cd "${SERVICE_NAME}"
          git init
          git config user.email "platform@walmart.com"
          git config user.name "Platform Bot"
          git checkout -b main
          git add -A
          git commit -m "feat: initialize ${SERVICE_NAME} from golden-path template"

          if gh repo view "${ORG}/${SERVICE_NAME}" --json name >/dev/null 2>&1; then
            echo "Repository ${ORG}/${SERVICE_NAME} already exists, pushing update"
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${ORG}/${SERVICE_NAME}.git"
            git push -u origin main --force
          else
            gh repo create "${ORG}/${SERVICE_NAME}" \
              --public \
              --description "${SERVICE_NAME} owned by ${TEAM_ID} (${{ inputs.language }})" \
              --source . \
              --push
          fi

          echo "Repository ready: https://github.com/${ORG}/${SERVICE_NAME}"

      - name: Configure repo secrets
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          gh secret set PORT_CLIENT_ID \
            --body "${{ secrets.PORT_CLIENT_ID }}" \
            --repo "${ORG}/${SERVICE_NAME}"
          gh secret set PORT_CLIENT_SECRET \
            --body "${{ secrets.PORT_CLIENT_SECRET }}" \
            --repo "${ORG}/${SERVICE_NAME}"
          echo "Port secrets configured on ${SERVICE_NAME}"

      - name: Log repo created
        if: inputs.port_run_id != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          logMessage: |
            Repository created from golden-path template
            - Dockerfile, K8s manifests, CI pipeline included
            - Port secrets configured for automated catalog updates
          link: '["https://github.com/mike-check-12-12/${{ inputs.service_name }}"]'

      - name: Register service in Port catalog
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: UPSERT
          runId: ${{ inputs.port_run_id }}
          identifier: ${{ inputs.service_name }}
          blueprint: service
          title: ${{ inputs.service_name }}
          properties: |-
            {
              "github_repo": "https://github.com/mike-check-12-12/${{ inputs.service_name }}",
              "language": "${{ inputs.language }}",
              "tier": "${{ inputs.tier }}"
            }
          relations: |-
            {
              "team": "${{ steps.team.outputs.id }}"
            }

      - name: Trigger deployment pipeline
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          sleep 5
          gh workflow run deploy.yml \
            --repo "${ORG}/${SERVICE_NAME}" \
            --ref main \
            -f environment=${{ inputs.environment }} 2>/dev/null || echo "CI will run on next push"
          echo "Deployment pipeline triggered"

      - name: Log CI triggered
        if: inputs.port_run_id != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          logMessage: |
            CI/CD pipeline triggered on **${{ inputs.service_name }}**
            - Build, Security Scan (Snyk), Deploy to ${{ inputs.environment }}
            - Deployment and Security entities will auto-appear in the catalog

      - name: Report SUCCESS
        if: inputs.port_run_id != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          status: "SUCCESS"
          logMessage: |
            Service **${{ inputs.service_name }}** created successfully!

            What happened:
            1. GitHub repo created from golden-path template
            2. Service registered in the portal catalog
            3. CI/CD pipeline running (Build, Snyk Scan, Deploy)
            4. Deployment and Security entities will appear shortly
          link: '["https://github.com/mike-check-12-12/${{ inputs.service_name }}"]'

      - name: Report FAILURE
        if: failure() && inputs.port_run_id != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          status: "FAILURE"
          logMessage: "Failed to create service **${{ inputs.service_name }}**. Check workflow logs: https://github.com/mike-check-12-12/service-scaffolder/actions"