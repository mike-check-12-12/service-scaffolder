name: Scaffold New Microservice

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: "Name of the new microservice"
        required: true
        type: string
      team:
        description: "Owning team identifier"
        required: true
        type: string
      domain:
        description: "Business domain"
        required: true
        type: string
      language:
        description: "Primary programming language"
        required: true
        type: choice
        options:
          - Java
          - Go
          - Python
          - TypeScript
          - Rust
          - Kotlin
      tier:
        description: "Service tier"
        required: true
        type: choice
        options:
          - "Tier 1 - Critical"
          - "Tier 2 - Standard"
          - "Tier 3 - Internal"
      port_run_id:
        description: "Port action run ID (auto-populated)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - name: Log starting to Port
        if: ${{ inputs.port_run_id != '' }}
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.getport.io
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          logMessage: "🚀 Starting scaffold for service '${{ inputs.service_name }}' in ${{ inputs.language }}..."

      - name: Create service repository
        id: create_repo
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          REPO_NAME="${{ inputs.service_name }}"
          ORG="mike-check-12-12"

          echo "Creating repository ${ORG}/${REPO_NAME}..."
          gh repo create "${ORG}/${REPO_NAME}" \
            --public \
            --description "${{ inputs.service_name }} - ${{ inputs.domain }} domain (${{ inputs.language }})" \
            --add-readme

          echo "repo_url=https://github.com/${ORG}/${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
          sleep 3

      - name: Clone and scaffold project structure
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          REPO_NAME="${{ inputs.service_name }}"
          ORG="mike-check-12-12"
          LANG="${{ inputs.language }}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${ORG}/${REPO_NAME}.git"
          cd "${REPO_NAME}"
          git config user.email "platform-engineering@walmart.com"
          git config user.name "Walmart Platform Bot"

          # Create standard directory structure
          mkdir -p src tests docs .github/workflows k8s

          # Create Dockerfile
          cat > Dockerfile <<'DOCKERFILE'
          # Auto-generated by Walmart Platform Engineering
          FROM base-image:latest
          WORKDIR /app
          COPY . .
          RUN echo "Build step for ${LANG}"
          CMD ["start"]
          DOCKERFILE

          # Create k8s deployment manifest
          cat > k8s/deployment.yaml <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${REPO_NAME}
            labels:
              app: ${REPO_NAME}
              domain: ${{ inputs.domain }}
              team: ${{ inputs.team }}
              tier: "${{ inputs.tier }}"
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: ${REPO_NAME}
            template:
              metadata:
                labels:
                  app: ${REPO_NAME}
              spec:
                containers:
                  - name: ${REPO_NAME}
                    image: walmart-registry/${REPO_NAME}:latest
                    ports:
                      - containerPort: 8080
          EOF

          # Create CI pipeline
          cat > .github/workflows/ci.yaml <<'CIYAML'
          name: CI Pipeline
          on:
            push:
              branches: [main]
            pull_request:
              branches: [main]
          jobs:
            build-and-test:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - name: Build
                  run: echo "Building..."
                - name: Test
                  run: echo "Running tests..."
                - name: Security Scan
                  run: echo "Scanning dependencies..."
          CIYAML

          # Language-specific scaffolding
          case "${LANG}" in
            Java)
              cat > src/Application.java <<'JAVA'
          package com.walmart.service;
          // Auto-scaffolded by Platform Engineering
          public class Application {
              public static void main(String[] args) {
                  System.out.println("Service starting...");
              }
          }
          JAVA
              ;;
            Go)
              cat > src/main.go <<'GOLANG'
          package main
          import "fmt"
          // Auto-scaffolded by Platform Engineering
          func main() {
              fmt.Println("Service starting...")
          }
          GOLANG
              ;;
            Python)
              cat > src/main.py <<'PYTHON'
          """Auto-scaffolded by Platform Engineering."""
          def main():
              print("Service starting...")
          if __name__ == "__main__":
              main()
          PYTHON
              cat > requirements.txt <<'REQ'
          fastapi>=0.100.0
          uvicorn>=0.23.0
          REQ
              ;;
            TypeScript)
              cat > src/index.ts <<'TS'
          // Auto-scaffolded by Platform Engineering
          console.log("Service starting...");
          TS
              cat > package.json <<PKGJSON
          {
            "name": "${REPO_NAME}",
            "version": "1.0.0",
            "scripts": { "start": "ts-node src/index.ts" }
          }
          PKGJSON
              ;;
            Rust)
              cat > src/main.rs <<'RUST'
          // Auto-scaffolded by Platform Engineering
          fn main() {
              println!("Service starting...");
          }
          RUST
              ;;
            Kotlin)
              cat > src/Application.kt <<'KOTLIN'
          // Auto-scaffolded by Platform Engineering
          fun main() {
              println("Service starting...")
          }
          KOTLIN
              ;;
          esac

          # Create CODEOWNERS
          cat > .github/CODEOWNERS <<EOF
          * @mike-check-12-12/${{ inputs.team }}
          EOF

          # Create service catalog docs
          cat > docs/SERVICE.md <<EOF
          # ${{ inputs.service_name }}

          **Domain:** ${{ inputs.domain }}
          **Team:** ${{ inputs.team }}
          **Language:** ${{ inputs.language }}
          **Tier:** ${{ inputs.tier }}

          ## Overview
          This service was scaffolded by Walmart Platform Engineering.

          ## Getting Started
          See the README for development setup instructions.
          EOF

          # Commit & push
          git add -A
          git commit -m "feat: scaffold ${REPO_NAME} microservice [platform-engineering]"
          git push origin main

      - name: Register service in Port catalog
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.getport.io
          operation: UPSERT
          identifier: ${{ inputs.service_name }}
          blueprint: service
          title: ${{ inputs.service_name }}
          properties: |-
            {
              "tier": "${{ inputs.tier }}",
              "lifecycle": "Development",
              "primary_language": "${{ inputs.language }}",
              "on_call": "",
              "slack_channel": "#${{ inputs.service_name }}",
              "has_monitoring": false,
              "has_runbook": false,
              "test_coverage": 0,
              "critical_vulns": 0
            }
          relations: |-
            {
              "domain": "${{ inputs.domain }}"
            }

      - name: Log completion to Port
        if: ${{ inputs.port_run_id != '' }}
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.getport.io
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          logMessage: "✅ Service '${{ inputs.service_name }}' scaffolded successfully! Repo: https://github.com/mike-check-12-12/${{ inputs.service_name }}"
          status: "SUCCESS"
          link: '["https://github.com/mike-check-12-12/${{ inputs.service_name }}"]'

      - name: Log failure to Port
        if: ${{ failure() && inputs.port_run_id != '' }}
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.getport.io
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          logMessage: "❌ Failed to scaffold service '${{ inputs.service_name }}'. Check workflow logs."
          status: "FAILURE"
