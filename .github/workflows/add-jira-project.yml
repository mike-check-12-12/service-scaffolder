name: Add Jira Project

on:
  workflow_dispatch:
    inputs:
      project_key:
        description: "Jira project key (e.g. CART, PLAT)"
        required: true
        type: string
      project_title:
        description: "Display name for the project"
        required: true
        type: string
      lead:
        description: "Project lead name"
        required: true
        type: string
      project_type:
        description: "Jira project type"
        required: true
        type: string
      url:
        description: "Jira project URL"
        required: true
        type: string
      port_run_id:
        description: "Port action run ID"
        required: true
        type: string

jobs:
  add-jira-project:
    runs-on: ubuntu-latest

    steps:
      - name: Log Starting
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          logMessage: "📁 Creating Jira Project '${{ inputs.project_key }}' — ${{ inputs.project_title }}..."

      - name: Create Jira Project Entity
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: UPSERT
          identifier: ${{ inputs.project_key }}
          title: ${{ inputs.project_title }}
          blueprint: jiraProject
          runId: ${{ inputs.port_run_id }}
          properties: |
            {
              "key": "${{ inputs.project_key }}",
              "lead": "${{ inputs.lead }}",
              "project_type": "${{ inputs.project_type }}",
              "issue_count": 0,
              "url": "${{ inputs.url }}"
            }

      - name: Report SUCCESS
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          status: "SUCCESS"
          logMessage: "✅ Jira Project '${{ inputs.project_key }}' (${{ inputs.project_title }}) created. Lead: ${{ inputs.lead }}"

      - name: Report FAILURE
        if: failure()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          status: "FAILURE"
          logMessage: "❌ Failed to create Jira Project '${{ inputs.project_key }}'"
