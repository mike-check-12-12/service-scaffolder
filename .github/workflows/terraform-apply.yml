name: Terraform — Provision Port Org

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
      port_run_id:
        description: "Port action run ID"
        required: false
        type: string

env:
  TF_VAR_port_client_id: ${{ secrets.PORT_CLIENT_ID }}
  TF_VAR_port_client_secret: ${{ secrets.PORT_CLIENT_SECRET }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Show Plan Summary
        run: |
          echo "### Terraform Plan Result" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.plan.outcome }}" == "success" ]; then
            echo "✅ Plan succeeded" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Plan failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -auto-approve

      - name: Report SUCCESS to Port
        if: inputs.port_run_id != '' && success()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          status: "SUCCESS"
          logMessage: "Terraform ${{ inputs.action }} completed successfully."

      - name: Report FAILURE to Port
        if: inputs.port_run_id != '' && failure()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          status: "FAILURE"
          logMessage: "Terraform ${{ inputs.action }} failed."
