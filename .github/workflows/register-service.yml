name: Register Existing Service

on:
  workflow_dispatch:
    inputs:
      service_id:
        description: "Service identifier (lowercase, hyphens)"
        required: true
        type: string
      service_title:
        description: "Display name for the service"
        required: true
        type: string
      domain:
        description: "Business domain this service belongs to"
        required: true
        type: string
      tier:
        description: "Service tier"
        required: true
        type: string
      lifecycle:
        description: "Current lifecycle stage"
        required: true
        type: string
      primary_language:
        description: "Primary programming language"
        required: true
        type: string
      on_call:
        description: "On-call contact (e.g. @team-oncall)"
        required: false
        type: string
      slack_channel:
        description: "Service Slack channel"
        required: true
        type: string
      test_coverage:
        description: "Test coverage percentage (0-100)"
        required: false
        type: string
        default: "0"
      port_run_id:
        description: "Port action run ID"
        required: true
        type: string

jobs:
  register-service:
    runs-on: ubuntu-latest

    steps:
      - name: Log Starting
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          logMessage: "📋 Registering existing service '${{ inputs.service_title }}' into the catalog..."

      - name: Register Service Entity
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: UPSERT
          identifier: ${{ inputs.service_id }}
          title: ${{ inputs.service_title }}
          blueprint: service
          runId: ${{ inputs.port_run_id }}
          properties: |
            {
              "tier": "${{ inputs.tier }}",
              "lifecycle": "${{ inputs.lifecycle }}",
              "primary_language": "${{ inputs.primary_language }}",
              "slack_channel": "${{ inputs.slack_channel }}",
              "on_call": "${{ inputs.on_call }}",
              "has_monitoring": false,
              "has_runbook": false,
              "test_coverage": ${{ inputs.test_coverage }},
              "critical_vulns": 0
            }
          relations: |
            {
              "domain": "${{ inputs.domain }}"
            }

      - name: Report SUCCESS
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          status: "SUCCESS"
          logMessage: "✅ Service '${{ inputs.service_title }}' registered. Domain: ${{ inputs.domain }}, Tier: ${{ inputs.tier }}, Language: ${{ inputs.primary_language }}"

      - name: Report FAILURE
        if: failure()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          status: "FAILURE"
          logMessage: "❌ Failed to register service '${{ inputs.service_title }}'"
